<!DOCTYPE html>
<html>

<head>
<title>Move Inventory</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Move Inventory</h2>

<form method="POST">

<div class="mb-3">
<label class="form-label">Select Product</label>
<select name="product_id" class="form-control">
{% for product in products %}
<option value="{{ product['ID'] }}">
{{ product["Product Name"] }}
</option>
{% endfor %}
</select>
</div>

<div class="mb-3">
<label class="form-label">Quantity</label>
<input type="number" name="quantity" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Move From</label>
<select name="move_from" class="form-control">
<option>Store</option>
<option>Warehouse</option>
</select>
</div>

<!-- Removed move_to because backend does not use it -->

<button type="submit" class="btn btn-warning">Move Inventory</button>
<a href="/" class="btn btn-secondary">Back</a>

</form>

</body>
</html>
